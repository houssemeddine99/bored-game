<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Serpent Arena</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-one"></div>
    <div class="bg-orb orb-two"></div>

    <main class="game-shell">
      <header class="hud">
        <div class="hud-card">
          <p class="label">P1 Score</p>
          <p id="score" class="value">0</p>
        </div>
        <div class="hud-card">
          <p class="label">Coins</p>
          <p id="coins" class="value">0</p>
        </div>
        <div id="p2-card" class="hud-card hidden-card">
          <p class="label">P2 Score</p>
          <p id="p2-score" class="value">0</p>
        </div>
        <div class="hud-card">
          <p class="label">Best</p>
          <p id="best" class="value">0</p>
        </div>
        <div class="hud-card hint">
          <p class="label">Controls</p>
          <p id="controls-text" class="value small">P1: WASD/Arrows + Space boost</p>
        </div>
        <div class="hud-card">
          <p class="label">Combo</p>
          <p id="combo-text" class="value small">x1.00</p>
        </div>
        <div class="hud-card">
          <p class="label">Mission</p>
          <p id="mission-text" class="value small">Loading...</p>
        </div>
      </header>

      <section class="arena-wrap">
        <canvas id="game" aria-label="Snake game canvas"></canvas>

        <aside class="arena-ui">
          <div class="panel">
            <p class="label">Minimap</p>
            <canvas id="minimap" width="180" height="180" aria-label="Minimap"></canvas>
          </div>
          <div class="panel">
            <p class="label">Leaderboard</p>
            <ol id="leaderboard" class="leaderboard"></ol>
          </div>
        </aside>

        <div id="overlay" class="overlay hidden" role="dialog" aria-live="polite">
          <div class="overlay-card">
            <h1>Neon Serpent Arena</h1>
            <p id="overlay-text">Use Settings to choose mode, bots, skins and game options. Then tap Start.</p>
            <div class="settings-panel-wrap">
              <button id="settings-btn" type="button" class="settings-btn">Settings</button>
              <div id="settings-panel" class="settings-panel collapsed">
                <label class="mode-label" for="mode-select">Mode</label>
                <select id="mode-select" class="mode-select">
                  <option value="solo">Solo + Bots</option>
                  <option value="duo">2 Players + Bots</option>
                </select>
                <label class="mode-label" for="bot-select">Bots</label>
                <select id="bot-select" class="mode-select">
                  <option value="2">2</option>
                  <option value="4">4</option>
                  <option value="6" selected>6</option>
                  <option value="8">8</option>
                </select>
                <label class="mode-label" for="arena-select">Arena</label>
                <select id="arena-select" class="mode-select">
                  <option value="small">Small</option>
                  <option value="medium" selected>Medium</option>
                  <option value="large">Large</option>
                </select>
                <label class="mode-label" for="rules-select">Rules</label>
                <select id="rules-select" class="mode-select">
                  <option value="classic" selected>Classic</option>
                  <option value="sudden">Sudden Death Zone</option>
                </select>
                <label class="mode-label" for="difficulty-select">Bot AI</label>
                <select id="difficulty-select" class="mode-select">
                  <option value="easy">Easy</option>
                  <option value="normal" selected>Normal</option>
                  <option value="hard">Hard</option>
                </select>
                <label class="mode-label" for="skin-select">Skin</label>
                <select id="skin-select" class="mode-select"></select>
                <label class="mode-label" for="hat-select">Hat</label>
                <select id="hat-select" class="mode-select"></select>
                <label class="mode-label" for="necklace-select">Necklace</label>
                <select id="necklace-select" class="mode-select"></select>
                <label class="mode-label" for="joystick-sense">Joystick Sensitivity</label>
                <input id="joystick-sense" type="range" min="0.6" max="1.8" step="0.1" value="1" />
                <label class="mode-label" for="handedness-select">Touch Layout</label>
                <select id="handedness-select" class="mode-select">
                  <option value="right" selected>Right-handed</option>
                  <option value="left">Left-handed</option>
                </select>
                <label class="check-row" for="vibration-toggle">
                  <input id="vibration-toggle" type="checkbox" checked />
                  <span>Vibration feedback</span>
                </label>
              </div>
            </div>
            <p id="progress-text" class="progress-text"></p>
            <ul id="summary" class="summary"></ul>
            <p id="countdown" class="countdown"></p>
            <div class="start-actions">
              <button id="start-btn" type="button">Start Run</button>
              <button id="quick-start-btn" type="button" class="secondary-btn">Quick Start</button>
            </div>
            <a class="online-link" href="online.html">Try Online Multiplayer</a>
          </div>
        </div>
      </section>

      <section class="touch-controls" aria-label="Touch controls">
        <div id="joystick-base" class="joystick-base" aria-label="Movement joystick" role="application">
          <div id="joystick-knob" class="joystick-knob"></div>
        </div>
        <div class="mid-row">
          <button id="fullscreen-btn" class="touch-btn fullscreen-btn" type="button" aria-label="Toggle fullscreen">
            Fullscreen
          </button>
          <button class="touch-btn boost-btn" data-dir="boost">Boost</button>
        </div>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
