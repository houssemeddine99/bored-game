<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Serpent Online</title>
    <link rel="stylesheet" href="online.css" />
  </head>
  <body>
    <main class="layout">
      <header class="topbar">
        <h1>Neon Serpent Online</h1>
        <a href="index.html">Back to Local Mode</a>
      </header>

      <section class="controls">
        <label>
          Server URL
          <input id="server-url" value="http://localhost:3000" />
        </label>
        <label>
          Name
          <input id="player-name" value="Player" maxlength="16" />
        </label>
        <button id="connect-btn">Connect</button>
      </section>

      <section class="status-row">
        <p id="status">Disconnected</p>
        <p id="score">Score: 0</p>
      </section>

      <section class="canvas-wrap">
        <canvas id="online-canvas" aria-label="Online game canvas"></canvas>
      </section>

      <p class="hint">Controls: WASD/Arrows. Hold Space to boost.</p>
    </main>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js" integrity="sha384-n8mPcaPf7Y8U9qfM9AU7f6nR0w8Yh1b6fN8o7jN8T+yj5x8wV+Nsh4h9rL5k2e9H" crossorigin="anonymous"></script>
    <script src="online.js"></script>
  </body>
</html>
